<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <script type="module" src="/src/main.js" defer></script>
    <title>XENIA</title>
  </head>
<!-- ---------------------------INICIO DEL CUERPO PRINCIPAL------------------------------ -->

<!-- ===================================================== -->
<!-- ------------------CUERPO PRINCIPAL------------------- -->
<!-- ===================================================== -->
<body class="h-screen flex flex-col text-black">

  <!-- ============FONDO FIJO============ -->

  <div class="fixed inset-0 -z-20">
    <img src="imagenes/fondo.jpg" class="w-full h-full object-cover"/>
  </div>

  <!-- =============LOGO FIJO============ -->
  <div class="fixed inset-0 flex items-center justify-center -z-10 pointer-events-none">
    <img src="imagenes/logo_xenia_dreams.png" class="h-50 w-auto opacity-80 rounded-full border"/>
  </div>

  <!-- ===================================================== -->
  <!-- -------------------ENCABEZADO------------------------ -->
  <!-- ===================================================== -->

  <header class="shrink-0 border-b border-red-500 bg-white backdrop-blur px-4 h-40 flex items-center justify-between z-10">

    <!-- LOGO PEQUEÑO -->
    <img src="imagenes/logo_xenia_dreams.png" class="h-35 w-auto rounded-full border"/>

    <!-- =============NAVEGACION============ -->
    <nav class="flex gap-6 text-blue-600 font-medium">
      <a href="#" data-target="inicio" class="nav-link hover:text-red-300 hover:font-bold">Inicio</a>
      <a href="#" data-target="formulario" class="nav-link hover:text-red-300 hover:font-bold">Sercicios</a>
      <a href="#" data-target="contacto" class="nav-link hover:text-red-300 hover:font-bold">Contacto</a>
    </nav>

    <!-- PERFIL -->
    <div class="relative">

      <button id="perfilBtn"
        class="flex items-center gap-2 px-2 py-1 rounded-md hover:bg-white/10 text-black">

        <img src="imagenes/agregar-usuario.png"
             class="h-9 w-9 rounded-full border" />

        <span class="text-sm">Perfil</span>
        <span>▼</span>

      </button>

      <!-- DROPDOWN -->
      <div id="menu"
        class="hidden absolute right-0 mt-2 w-48 bg-white border rounded-md shadow-lg z-20">

        <a href="#" class="block px-4 py-2 hover:bg-green-700 hover:text-white">Temas</a>
        <a href="#" class="block px-4 py-2 hover:bg-green-700 hover:text-white">Iniciar Sesión</a>
        <a href="#" class="block px-4 py-2 hover:bg-green-700 hover:text-white">Registro</a>

      </div>

    </div>

  </header>

  <!-- ===================================================== -->
  <!-- ----------------MAIN_1 (INICIO_SCROLL SOLO AQUÍ)-------------- -->
  <!-- ===================================================== -->
  <main id="inicio" class="flex-1 overflow-y-auto p-6">

    <!-- ============ TÍTULO 1 ============== -->

    <div class="rounded-lg shadow-sm flex justify-between items-center">
      <h1 class="text-3xl md:text-3xl text-white" style="font-family: 'Luckiest Guy';">
        TU VIAJE COMO UN SUEÑO. . .
      </h1>

      <button data-target="formulario" class="nav-link bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold shadow-md hover:bg-blue-700 hover:scale-105 transition-all duration-300">
        Rellenar formulario de viaje
      </button>
    </div>

    <!-- ============BUSCADOR============== -->
    <div class="w-full max-w-md mx-auto mt-10">

      <div class="relative">
        <input type="text" placeholder="Buscar..." class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-blue-300" />
      </div>

    </div>

    <!-- ================CONTENIDO======================= -->
    <section class="p-6 ">

      <div class="flex justify-center gap-10">
        <a href="https://www.hotelpuertadebilbao.com/" target="_blank">
          <img src="imagenes/pais_vasco.jpg" class=" w-80 object-cover rounded-lg border-2 border-transparent 
            hover:border-blue-500 transition-all duration-300 animate-float" />
        </a>
        
        <a href="https://fptxurdinaga.eus/" target="_blank">
          <img src="imagenes/estudiante.jpg" class="w-80 object-cover rounded-lg border-2 border-transparent 
            hover:border-blue-500 transition-all duration-300 animate-float" />
        </a>
        
        <a href="https://www.marriott.com/es/default.mi" target="_blank">
          <img src="imagenes/madrid.jpg" class="w-80 object-cover rounded-lg border-2 border-transparent 
            hover:border-blue-500 transition-all duration-300 animate-float" />
        </a>
        
      </div>

    </section>

  </main>   <!-- FIN DEL MAIN 1 -->


  <!-- ===================================================== -->
  <!-- ---------MAIN_2 (FORMULARIO_SCROLL SOLO AQUÍ)-------- -->
  <!-- ===================================================== -->

  <main id="formulario" class="hidden flex-1 overflow-y-auto p-6">

    <div class="max-w-4xl mx-auto p-8 rounded-2xl shadow-lg bg-black/60 text-white">
    
      <h1 class="text-3xl md:text-4xl font-bold text-center mb-8">
        GESTIÓN DE VIAJE DEL ESTUDIANTE
      </h1>
    
      <form id="formEstudiante" class="space-y-6"> <!-- space-y-6: AÑADE SEPARACION VERTICAL ENTRE HIJOS. -->

      
        <div class="grid grid-cols-1 gap-6">
        
          
          <div class="text-blue-600  datos_per">
            DATOS PERSONALES
            <div>
              <label class="block mb-1 text-sm text-gray-300">Nombre</label>
              <input name="NombrePer" type="text" class="w-full p-3 rounded-lg bg-white text-black" placeholder="Nombre">
            </div>
          
            <div>
              <label class="block mb-1 text-sm text-gray-300">Apellidos</label>
              <input name="ApellidosPer" type="text" class="w-full p-3 rounded-lg bg-white text-black" placeholder="Apellidos">
            </div>

            <div>
              <label class="block mb-1 text-sm text-gray-300">Instituto de origen</label>
              <input name="InstiOrigPer" type="text" class="w-full p-3 rounded-lg bg-white text-black" placeholder="Centro educativo">
            </div>
          
            <div>
              <label class="block mb-1 text-sm text-gray-300">Fecha de nacimiento</label>
              <input name="FecNacPer" type="date" class="w-full p-3 rounded-lg bg-white text-black" placeholder="dd/mm/aa">
            </div>

            <div>
              <label class="block mb-1 text-sm text-gray-300">Tipo de alojamiento</label>
              <select name="TipoAlojPer" class="w-full p-3 rounded-lg bg-white text-black">
                <option>Familia anfitriona</option>
                <option>Residencia</option>
                <option>Hotel</option>
              </select>
            </div>

            <div>
              <label class="block mb-1 text-sm text-gray-300">Email</label>
              <input name="EmailPer" type="email" class="w-full p-3 rounded-lg bg-white text-black" placeholder="correo@email.com">
            </div>
        
            <div>
              <label class="block mb-1 text-sm text-gray-300">Teléfono</label>
              <input name="TelPer" type="tel" class="w-full p-3 rounded-lg bg-white text-black" placeholder="Teléfono">
            </div>
          </div> <br>

          <div class="text-blue-600 solicitud">
            SOLICITUD
            <!-- RECUERDA: El id, el estado, observaciones y la fecha de solicitud se autorellenan -->
            <div>
            <label class="block mb-1 text-sm text-gray-300">Curso Académico</label>
              <div class="flex gap-2">
                <input name="curso_inicio" type="number"
                  class="w-full p-3 rounded-lg bg-white text-black"
                  placeholder="2025">
              
                <input name="curso_fin" type="number"
                  class="w-full p-3 rounded-lg bg-white text-black"
                  placeholder="2026">
              </div>
            </div>

          </div>

          <div class="text-blue-600  institutos">
            INSTITUTOS
            <div>
              <label class="block mb-1 text-sm text-gray-300 mt-4">Instituto</label>
              <select id="instituto" name="instituto" class="w-full p-3 rounded-lg bg-white text-black">
                <option value="">Selecciona primero una localidad</option>
              </select>
            </div>

            <!-- <div>
              <label class="block mb-1 text-sm text-gray-300">Email <span class="bg-white text-red-500">(*No rellenar)</span></label>
              <input name="EmailInst" type="text" class="w-full p-3 rounded-lg bg-white text-black" placeholder="Ej: correo@email.com">
            </div>

            <div>
              <label class="block mb-1 text-sm text-gray-300">Tel <span class="bg-white text-red-500">(*No rellenar)</span></label>
              <input name="TelInst" type="number" class="w-full p-3 rounded-lg bg-white text-black" placeholder="Ej: 634 733 775">
            </div> <br> -->

          </div>

          <div class="text-blue-600  grado">
            GRADO
            <div>
              <label class="block mb-1 text-sm text-gray-300">Nombre del curso o grado FP</label>
              <input name="NomGradoCurso" type="text" class="w-full p-3 rounded-lg bg-white text-black" placeholder="Ej: 2º Bachillerato, Telecomunicaciones">
            </div>
          
            <div>
              <label class="block mb-1 text-sm text-gray-300">Nivel (Solo si FPGS o FPGM)</label>
              <input name="NivelGrado" type="text" class="w-full p-3 rounded-lg bg-white text-black" placeholder="Ej: Grado superior">
            </div>
          
          </div> <br>

          <div class="text-blue-600 localidad">
            LOCALIDAD
            <div>
              <label class="block mb-1 text-sm text-gray-300">Nombre</label>
                <select  id="localidad" name="localidad" class="w-full p-3 rounded-lg bg-white text-black">
                  <option value="valencia">Valencia ciudad</option>
                  <option value="torrent">Torrent</option>
                  <option value="alcala">Alcalá de Henares</option>
                  <option value="torrejon">Torrejon de Ardoz</option>
                  <option value="bilbao">Bilbao</option>
                  <option value="getxo">Getxo</option>
                  <option value="jaen">Jaén</option>
                </select>
            </div>

            <div>
              <label class="block mb-1 text-sm text-gray-300">CodPostal</label>
              <input name="CodPost" type="number" class="w-full p-3 rounded-lg bg-white text-black" placeholder="Ej: 48441">
            </div>
          </div> <br>

          <div class="text-blue-600 comunidad">
            COMUNIDAD AUTONOMA
            <div>
              <label class="block mb-1 text-sm text-gray-300">Nombre</label>
              <input name="NomComAuton" type="text" class="w-full p-3 rounded-lg bg-white text-black" placeholder="Ej: Bilbao">
            </div>
          </div>
        
        </div>
      
        <!-- BOTÓN -->
        <div class="pt-6">
          <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg shadow-md transition-all duration-300 hover:scale-105">
            Guardar estudiante
          </button>
        </div>
      
      </form>
    
    </div>

  </main>

  <!-- ===================================================== -->
  <!-- --------MAIN_3 (SERVICIOS_SCROLL SOLO AQUÍ)----- -->
  <!-- ===================================================== -->
  <main id="servicios" class="hidden flex-1 overflow-y-auto p-6">

    <!-- ============ TÍTULO 3 ============== -->

    <div class="rounded-lg shadow-sm flex justify-between items-center">
      <h1 class="text-3xl md:text-4xl text-white" style="font-family: 'Luckiest Guy';">
        DATE UNA OPORTUNIDA. . .
      </h1>

      <a href="#" class="inline-block bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold shadow-md hover:bg-blue-700 hover:scale-105 transition-all duration-300">
        Rellenar formulario de viaje
      </a>
    </div>

    <!-- ============BUSCADOR============== -->
    <div class="w-full max-w-md mx-auto mt-10">

      <div class="relative">
        <input type="text" placeholder="Buscar..." class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-blue-300" />
      </div>

    </div>

    <!-- ================CONTENIDO======================= -->
    <section class="p-6 ">

      <div class="flex justify-center gap-10">
        <a href="https://www.hotelpuertadebilbao.com/" target="_blank">
          <img src="imagenes/pais_vasco.jpg" class=" w-80 object-cover rounded-lg border-2 border-transparent 
            hover:border-blue-500 transition-all duration-300 animate-float" />
        </a>
        
        <a href="https://fptxurdinaga.eus/" target="_blank">
          <img src="imagenes/estudiante.jpg" class="w-80 object-cover rounded-lg border-2 border-transparent 
            hover:border-blue-500 transition-all duration-300 animate-float" />
        </a>
        
        <a href="https://www.marriott.com/es/default.mi" target="_blank">
          <img src="imagenes/madrid.jpg" class="w-80 object-cover rounded-lg border-2 border-transparent 
            hover:border-blue-500 transition-all duration-300 animate-float" />
        </a>
        
      </div>

    </section>

  </main>   <!-- FIN DEL MAIN 3 -->




  <!-- ===================================================== -->
  <!-- FOOTER -->
  <!-- ===================================================== -->
  <footer class="shrink-0 border-t bg-white text-blue-500 text-sm p-6 text-center z-10">
    © 2026 Xenia Dreams
  </footer>

</body>
</html>
